name: Publish Python Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional context for running publish manually"
        required: false
        default: "manual trigger"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: https://gitea.potlilium.serraict.me/actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for setuptools_scm

      - name: Cache Python virtual environment
        id: cache-venv
        uses: https://gitea.potlilium.serraict.me/actions/cache@v3
        with:
          path: .venv
          key: ${{ runner.os }}-venv-build-${{ hashFiles('pyproject.toml') }}

      - name: Create virtual environment
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: python3 -m venv .venv

      - name: Install build dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: .venv/bin/pip install build twine setuptools_scm

      - name: Verify version
        run: .venv/bin/python -m setuptools_scm

      - name: Debug environment context
        env:
          TWINE_USERNAME: ${{ secrets.SERRA_PUBLISHER_USER }}
          TWINE_PASSWORD: ${{ secrets.SERRA_PUBLISHER_TOKEN }}
        run: |
          echo "Actor: ${{ gitea.actor }}"
          echo "Repository owner: ${{ gitea.repository_owner }}"
          echo "Server URL: ${{ gitea.server_url }}"
          python3 - <<'PY'
          import os

          required = ["TWINE_USERNAME", "TWINE_PASSWORD"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required secret(s): {', '.join(missing)}")
          print("Secrets present: " + ", ".join(required))
          PY

      - name: Validate package credentials
        env:
          TWINE_USERNAME: ${{ secrets.SERRA_PUBLISHER_USER }}
          TWINE_PASSWORD: ${{ secrets.SERRA_PUBLISHER_TOKEN }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import urllib.error
          import urllib.request

          server_url = "${{ gitea.server_url }}"
          owner = "${{ gitea.repository_owner }}"
          url = f"{server_url}/api/packages/{owner}/pypi"

          creds = f"{os.environ['TWINE_USERNAME']}:{os.environ['TWINE_PASSWORD']}"
          token = base64.b64encode(creds.encode()).decode()

          req = urllib.request.Request(url, method="GET")
          req.add_header("Authorization", f"Basic {token}")

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Credential probe succeeded with status {resp.status}")
          except urllib.error.HTTPError as exc:
              print(f"Credential probe failed: {exc.code} {exc.reason}")
              print(exc.read().decode())
              raise
          PY

      - name: Build package
        run: |
          .venv/bin/python -m build

      - name: Publish to Gitea
        env:
          TWINE_USERNAME: ${{ secrets.SERRA_PUBLISHER_USER }}
          TWINE_PASSWORD: ${{ secrets.SERRA_PUBLISHER_TOKEN }}
        run: |
          .venv/bin/twine upload --verbose --repository-url ${{ gitea.server_url }}/api/packages/${{ gitea.repository_owner }}/pypi dist/*
