services:
  production_control:
    image: ghcr.io/serraict/wetering-production-control:latest
    ports:
      - "7901:7901"
    env_file:
      - .env
    networks:
      - serra-vine

  bot:
    image: ghcr.io/serraict/wetering-production-control:latest
    # Same override-the-image-ENTRYPOINT reason as ontstapelaar_protocol
    # below: docker-entrypoint.sh hardcodes the web app, but this
    # container runs the FastAPI Zulip-webhook handler instead.
    entrypoint:
      ["uvicorn", "production_control.bot.server:app",
       "--host", "0.0.0.0", "--port", "7902"]
    ports:
      - "7902:7902"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7902/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - serra-vine

  ontstapelaar_protocol:
    image: ghcr.io/serraict/wetering-production-control:latest
    # Override the image's ENTRYPOINT (docker-entrypoint.sh) — that
    # script hardcodes "start the web app + tail webapp.log" and ignores
    # any CMD args. We want this container to run the protocol handler
    # in the foreground so compose log capture and restart policy work
    # against the right process.
    entrypoint: ["python", "-m", "production_control.opcua.protocol"]
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      # Reads heartbeat files written by each supervised OPC loop; flips
      # to unhealthy if either subscription is stale. Does NOT open its
      # own OPC session (the Omron and Leuze don't love extra sessions).
      test: ["CMD", "python", "-m", "production_control.opcua.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 60s
    networks:
      - serra-vine

  firebird:
    image: wmakley/firebird-2.5-cs
    environment:
      ISC_PASSWORD: masterkey
      FIREBIRD_DATABASE: production.fdb
      FIREBIRD_USER: SYSDBA
    ports:
      - "3050:3050"
    volumes:
      - firebird_data:/firebird/data
      - ./scripts/firebird:/docker-entrypoint-initdb.d
    networks:
      - serra-vine

networks:
  serra-vine:
    external: true

volumes:
  firebird_data:
